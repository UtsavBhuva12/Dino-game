<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dino Game</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f7f7f7;
    font-family:Arial;
}

#game{
    width:800px;
    height:200px;
    border:2px solid #333;
    position:relative;
    overflow:hidden;
    background:white;
}

#dino{
    width:50px;
    height:50px;
    background:green;
    position:absolute;
    bottom:0;
    left:50px;
}

#cactus{
    width:25px;
    height:50px;
    background:#333;
    position:absolute;
    bottom:0;
    right:-30px;
}

.jump{
    animation:jump 0.5s ease;
}

@keyframes jump{
    0%{bottom:0}
    50%{bottom:90px}
    100%{bottom:0}
}

#score{
    position:absolute;
    top:10px;
    right:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="game">
    <div id="dino"></div>
    <div id="cactus"></div>
    <div id="score">Score: 0</div>
</div>

<script>

const dino = document.getElementById("dino");
const cactus = document.getElementById("cactus");
const scoreText = document.getElementById("score");

let cactusPosition = 800;
let score = 0;
let gameOver = false;

function jump(){
    if(!dino.classList.contains("jump")){
        dino.classList.add("jump");

        setTimeout(()=>{
            dino.classList.remove("jump");
        },500);
    }
}

document.addEventListener("keydown",jump);
document.addEventListener("click",jump);

function moveCactus(){

    if(gameOver) return;

    cactusPosition -= 5;

    if(cactusPosition < -30){
        cactusPosition = 800;
        score++;
    }

    cactus.style.right = (800 - cactusPosition) + "px";

    checkCollision();

    scoreText.innerText = "Score: " + score;

    requestAnimationFrame(moveCactus);
}

function checkCollision(){

    const dinoRect = dino.getBoundingClientRect();
    const cactusRect = cactus.getBoundingClientRect();

    if(
        dinoRect.right > cactusRect.left &&
        dinoRect.left < cactusRect.right &&
        dinoRect.bottom > cactusRect.top
    ){
        gameOver = true;
        alert("Game Over! Score: " + score);
        location.reload();
    }
}

moveCactus();

</script>

</body>
</html>
